version: "3.9"
services:
  fastapi-internal:
    build: .
    container_name:
      alplakes-fastapi-internal
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8000" ]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    volumes:
      - "${FILESYSTEM}:/code/filesystem"
    ports:
      - "8000:8000"
  fastapi-external:
    build: .
    environment:
      - EXTERNAL=true
    container_name:
      alplakes-fastapi-external
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8000" ]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    volumes:
      - "${FILESYSTEM}:/code/filesystem"
  nginx-external:
    image: nginx:alpine
    container_name: alplakes-nginx-external
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8001" ]
      interval: 10s
      timeout: 10s
      retries: 5
    ports:
      - "8001:8001"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi-external
    restart: unless-stopped