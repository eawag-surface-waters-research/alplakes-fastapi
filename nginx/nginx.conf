worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 0.0.0.0/0;

    map $http_origin $limit_key {
        default                          $binary_remote_addr;
        "https://www.alplakes.eawag.ch"  "";
        "https://www.datalakes-eawag.ch" "";
        "https://www.datalakes.eawag.ch" "";
        "http://localhost:3000"          "";
    }

    limit_req_zone $limit_key zone=external_api:10m rate=3r/s;
    limit_req_log_level warn;

    server {
        listen 8001;

        limit_req_status 429;
        error_page 429 = @ratelimited;

        location @ratelimited {
            default_type application/json;
            return 429 '{"detail":"Rate limit exceeded. Please add more time between your requests. For details on limits or rate of updates please contact the developer."}';
        }

        location / {
            limit_req zone=external_api burst=10 nodelay;

            proxy_pass             http://fastapi-external:8000;
            proxy_http_version     1.1;
            proxy_set_header       Connection         "";
            proxy_set_header       Host               $host;
            proxy_set_header       X-Real-IP          $remote_addr;
            proxy_set_header       X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto  $scheme;
            proxy_read_timeout     180s;
        }
    }
}
